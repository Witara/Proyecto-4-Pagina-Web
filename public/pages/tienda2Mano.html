<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tienda Segunda Mano</title>
  <link rel="stylesheet" href="../style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet"/>
</head>
<body>
  <div class="container">
    <div id="nav-placeholder"></div>

    <section class="background">
      <img src="../assets/background.png" alt="Landing" class="background-img" />
    </section>
    <div class="background-overlay"></div>
    <main class="store-layout">
      <section class="search-section">
        <div class="search-wrapper">
          <input type="text" placeholder="Buscar en la tienda..." class="search-input" id="search-input">
          <button class="search-btn">🔎︎</button>
        </div>
      </section>

      <div class="content-flex">
        <aside class="sidebar-filters">
          <h3>Filtros</h3>
          <div class="filter-group" id="status-filters">
            <h4>Estado</h4>
            <label><input type="checkbox" value="Nuevo"> Nuevo</label>
            <label><input type="checkbox" value="Usado - Como nuevo"> Usado - Como nuevo</label>
            <label><input type="checkbox" value="Usado - Buen estado"> Usado - Buen estado</label>
          </div>
          <div class="filter-group">
            <h4>Precio</h4>
              <select class="dark-select" id="price-filter">
                <option value="all">Todos los precios</option>
                <option value="0-50">0€ - 50€</option>
                <option value="50-200">50€ - 200€</option>
                <option value="200-plus">Más de 200€</option>
              </select>
          </div>
        </aside>

        <section class="products-grid">
          
          </section>
      </div>
    </main>

    <!-- Login/Register form section (initially hidden) -->
    <div id="overlay" class="overlay hidden"></div>
    <div id="login-form" class="form-wrapper hidden">
      <button id="close-login" class="close-btn">&times;</button>
      <h1 class="logo">Placeholder Text</h1>
      <p class="subtitle">Placeholder Text</p>

      <input type="text" id="inputField3" placeholder="Email" />
      <input type="text" id="inputField" placeholder="Username" />
      <input type="password" id="inputField2" placeholder="Password" />

      <button onclick="registerUser()" class="registerButton">Register</button>
      <p id="message" class="message"></p>
    </div>
    <div id="product-overlay" class="product-detail-overlay hidden">
        <div class="product-detail-content">
            <button id="close-detail" class="close-btn">&times;</button>
            <div class="detail-grid">
                <div class="detail-image">
                    <img id="detail-img" src="" alt="">
                </div>
                <div class="detail-info">
                    <h1 id="detail-title"></h1>
                    <p class="detail-status">Estado: <span id="detail-status-val"></span></p>
                    <p class="detail-description" id="detail-desc">
                        Este producto ha sido verificado por nuestros expertos para garantizar su calidad y funcionamiento óptimo.
                    </p>
                    <div class="detail-footer">
                        <span class="detail-price" id="detail-price"></span>
                        <div>
                          <button class="buy-btn large">Añadir a la cesta</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
  </div>

  <script src="../script.js"></script>
</body>
</html>
